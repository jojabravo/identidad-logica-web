<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identidad Lógica | Laboratorio Josefa Campos</title>
    <link rel="stylesheet" href="style.css"> </head>
<body>

    <div id="pantalla-login">
        <div class="caja-login">
            <h2>Identidad Lógica</h2>
            <p>Laboratorio Interactivo Josefa Campos</p>
            <input type="text" id="user-name" placeholder="Escribe tu nombre completo...">
            <button onclick="login()">INGRESAR AL JUEGO →</button>
        </div>
    </div>

    <div id="interfaz-juego" style="display: none;">
        <nav class="navbar">
            <div class="perfil-nav">
                <div class="casa-icon">🏠</div>
                <div class="user-info">
                    <span class="game-title">Identidad Lógica</span>
                    <span class="student-name">ESTUDIANTE: <span id="display-name"></span></span>
                </div>
            </div>

            <div class="gamificacion">
                <span class="label-progreso">PROGRESO:</span>
                <div class="contenedor-progreso">
                    <div id="progreso-visual" class="barra-relleno"></div>
                </div>
                <div class="monedas-display">💰 <span id="puntos-actuales">0</span></div>
            </div>

            <div class="nav-buttons">
                <button class="btn-nav btn-buzon">✉ BUZÓN</button>
                <button onclick="location.reload()" class="btn-nav btn-salir">SALIR</button>
            </div>
        </nav>

        <div class="mapa-interactivo">
            <img src="calle-barrio.jpg" class="img-mapa-bg">
            <div class="punto-nivel" id="lvl0" onclick="abrirNivel(0)">0</div>
            <div class="punto-nivel" id="lvl1" onclick="abrirNivel(1)">1</div>
            <div class="punto-nivel" id="lvl2" onclick="abrirNivel(2)">2</div>
            <div class="punto-nivel" id="lvl3" onclick="abrirNivel(3)">3</div>
            <div class="punto-nivel" id="lvl4" onclick="abrirNivel(4)">4</div>
        </div>

        <footer>
            <div class="autor">Jorge Armando Jaramillo Bravo</div>
            <div class="titulos">⚛️ UdeA | ♉ UNAL | 🎓 UTEL</div>
            <div class="copy-lab">© 2026 - LABORATORIO INTERACTIVO JOSEFA CAMPOS</div>
        </footer>
    </div>

    <script src="script.js"></script> </body>
</html>
